# Nginx phục vụ frontend tĩnh + proxy /api sang gateway (trong mạng Docker).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Nén cho nhẹ đường truyền.
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # Mọi request /api chuyển tiếp sang API Gateway (tên service trong compose).
  location /api/ {
    proxy_pass http://gateway:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA: mọi route không khớp file -> trả index.html (React Router lo phần còn lại).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache tài sản có hash tên (immutable) lâu dài.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
