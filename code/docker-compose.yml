# docker-compose cho môi trường LOCAL: Postgres + Redis + Keycloak.
# App (các service) chạy trực tiếp bằng pnpm khi dev cho nhanh (hot reload).
# Từ Phần 6: Postgres tạo 2 DB app_auth + app_user (database-per-service) qua
# script init (docker/postgres-init). Ở Phần 8 ta sẽ đóng gói service vào compose.

services:
  postgres:
    image: postgres:16-alpine
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Tạo app_auth + app_user lần đầu khởi tạo. LƯU Ý: chỉ chạy khi volume còn
      # trống -> nếu đã lỡ init trước đó, chạy `pnpm db:reset` để tạo lại.
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Keycloak: Auth Server / Identity Provider dùng cho Phần 3 (OAuth/OIDC).
  # Chạy ở chế độ dev, tự import realm "app" (client + user test) khi khởi động.
  # Admin console: http://localhost:8081  (admin / admin)
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: app_keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import

  # Jaeger all-in-one: nhận trace qua OTLP rồi hiển thị (6.6).
  #   UI:        http://localhost:16686
  #   OTLP http: 4318  (các service export trace tới đây)
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: app_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318" # OTLP HTTP

volumes:
  postgres_data:
  redis_data:
