# docker-compose cho môi trường LOCAL: chỉ chạy Postgres + Redis.
# App (api) ta chạy trực tiếp bằng `pnpm dev` khi dev cho nhanh (hot reload).
# Ở Phần 8 ta sẽ đóng gói cả api/frontend vào compose để chạy full stack.

services:
  postgres:
    image: postgres:16-alpine
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: app_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Keycloak: Auth Server / Identity Provider dùng cho Phần 3 (OAuth/OIDC).
  # Chạy ở chế độ dev, tự import realm "app" (client + user test) khi khởi động.
  # Admin console: http://localhost:8081  (admin / admin)
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: app_keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import

volumes:
  postgres_data:
  redis_data:
