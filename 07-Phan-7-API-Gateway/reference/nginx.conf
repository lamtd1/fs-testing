# THAM KHẢO (không nối vào docker-compose): cùng routing gateway-lite bằng Nginx.
# So sánh với apps/api/src (Express). Nginx nhanh & gọn cho routing thô, nhưng
# "verify JWT rồi gộp API" thì phải nhờ module Lua/OpenResty — đó là lúc nên tự viết.

events {}

http {
  # "Danh bạ" upstream — ứng với service registry của ta.
  upstream auth_service { server auth-service:4001; }
  upstream user_service { server user-service:4002; }

  server {
    listen 80;

    # CORS tối thiểu (thực tế nên cấu hình kỹ hơn).
    add_header Access-Control-Allow-Origin  http://localhost:5173 always;
    add_header Access-Control-Allow-Credentials true always;

    location /api/auth/ {
      proxy_pass http://auth_service;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;   # correlation-id
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/users/ {
      proxy_pass http://user_service;
      proxy_set_header Host $host;
      proxy_set_header X-Request-Id $request_id;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
